<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami | Lembang Kaero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light" style="font-family: 'Poppins', sans-serif;">

    <!-- (Gunakan Header & Navbar yang sama) -->

    <main class="container py-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-uppercase">Hubungi Kami</h2>
            <p class="text-muted">Layanan Pengaduan dan Alamat Kantor Pemerintah Lembang Kaero</p>
        </div>

        <div class="row g-4">
            <!-- Detail Informasi -->
            <div class="col-md-5">
                <div class="card border-0 shadow-sm p-4 h-100 bg-white">
                    <h4 class="fw-bold mb-4 text-danger">Informasi Kontak</h4>
                    <div class="mb-3 d-flex align-items-start">
                        <i class="bi bi-geo-alt-fill text-danger fs-4 me-3"></i>
                        <div>
                            <h6 class="fw-bold mb-1">Alamat Kantor:</h6>
                            <p class="text-muted small mb-0">Lembang Kaero, Kecamatan Sangalla', Kabupaten Tana Toraja, Sulawesi Selatan.</p>
                        </div>
                    </div>
                    <div class="mb-3 d-flex align-items-start">
                        <i class="bi bi-telephone-fill text-success fs-4 me-3"></i>
                        <div>
                            <h6 class="fw-bold mb-1">Telepon / WhatsApp:</h6>
                            <p class="text-muted small mb-0">+62 813-1878-5080</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-start">
                        <i class="bi bi-envelope-fill text-primary fs-4 me-3"></i>
                        <div>
                            <h6 class="fw-bold mb-1">Email Resmi:</h6>
                            <p class="text-muted small mb-0">info@lembang-kaero.desa.id</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Peta Google Maps Terintegrasi (Kecamatan Sangalla) -->
            <div class="col-md-7">
                <div class="card border-0 shadow-sm p-2 h-100 bg-white">
                   <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15933.28430752527!2d119.89748685!3d-3.03551525!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2d93f3c4db57065f%3A0x7be28dbec126b48d!2sSangalla&#39;%2C%20Kabupaten%20Tana%20Toraja%2C%20Sulawesi%20Selatan!5e0!3m2!1sid!2sid!4v1700000000000!5m2!1sid!2sid" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </main>

</html>
