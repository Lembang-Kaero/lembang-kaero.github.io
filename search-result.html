<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Pencarian | Lembang Kaero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link class="content-style" rel="stylesheet" href="assets/css/style.css">
    <style>
        .bg-maroon { background-color: #800000 !important; }
        .text-maroon { color: #800000 !important; }
    </style>
</head>
<body class="bg-light" style="font-family: 'Poppins', sans-serif;">

    <!-- Komponen Header Dinamis Anda -->
    <header id="header-component" class="container-fluid px-md-5 py-3 bg-white shadow-sm"></header>

    <main class="container py-5" style="min-height: 60vh;">
        <div class="card border-0 shadow-sm p-4 bg-white">
            <h3 class="fw-bold text-maroon border-bottom pb-3">
                <i class="bi bi-search me-2"></i>Hasil Pencarian
            </h3>
            
            <p class="text-secondary mb-4">
                Menampilkan hasil pencarian untuk kata kunci: <strong id="search-keyword-label" class="text-dark">"..."</strong>
            </p>

            <!-- Tempat Menampilkan Hasil Secara Dinamis -->
            <div id="search-results-container" class="row g-3">
                <!-- Efek Loading Sederhana -->
                <div class="text-center py-5 text-muted" id="search-loading">
                    <div class="spinner-border text-danger mb-2" role="status"></div>
                    <p>Mencari data...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Komponen Footer Dinamis Anda -->
    <footer id="footer-component" class="bg-dark text-white pt-5 pb-3 mt-5"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/Header.js"></script>
    <script src="assets/js/Footer.js"></script>

    <!-- JAVASCRIPT UNTUK MEMBACA & MENAMPILKAN HASIL PENCARIAN -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Ambil kata kunci dari URL (?keyword=...)
            const urlParams = new URLSearchParams(window.location.search);
            const keyword = urlParams.get('keyword');
            
            const label = document.getElementById("search-keyword-label");
            const container = document.getElementById("search-results-container");
            
            if (!keyword || keyword.trim() === "") {
                label.innerText = 'Tidak ada kata kunci';
                container.innerHTML = '<div class="col-12 text-center text-muted py-4">Silakan masukkan kata kunci pada kolom pencarian di atas.</div>';
                return;
            }

            // Tampilkan kata kunci yang dicari di layar
            label.innerText = `"${keyword}"`;

            // 2. Data Statis Halaman (Simulasi database lokal untuk situs statis)
            // Anda bisa menambah atau menyesuaikan daftar halaman ini
            const daftarHalaman = [
                { judul: "Profil Lembang Kaero - Sejarah", url: "profil.html", ringkasan: "Sejarah Tongkonan Layuk Kaero, sistem pemerintahan adat tradisional, struktur Tallu Lembangna, kepemimpinan adat, dan cagar budaya." },
                { judul: "Struktur Pemerintahan Lembang", url: "pemerintahan.html", ringkasan: "Informasi mengenai Kepala Lembang Nura Massora Salusu, perangkat desa, staf, dan roda birokrasi Lembang Kaero." },
                { judul: "Layanan Administrasi Warga", url: "layanan.html", ringkasan: "Daftar pengurusan surat pengantar, kartu keluarga, pelayanan kependudukan, dan administrasi publik di kantor Lembang." },
                { judul: "Transparansi Anggaran & APBL 2025", url: "transparansi.html", ringkasan: "Realisasi Anggaran Pendapatan dan Belanja Lembang (APBL) Kaero, laporan keuangan, dan alokasi dana desa." },
                { judul: "Kontak & Lokasi Kantor Lembang", url: "kontak.html", ringkasan: "Alamat lengkap Kantor Lembang Kaero, nomor telepon darurat, email resmi, dan integrasi peta Google Maps Kecamatan Sangalla'." },
                { judul: "Formulir Pengaduan Masyarakat", url: "pengaduan.html", ringkasan: "Sistem pelaporan online bagi warga Lembang Kaero untuk mengajukan keluhan, saran, aspirasi, atau aduan infrastruktur." }
            ];

            // 3. Proses Filter Data berdasarkan Keyword
            const hasilFilter = daftarHalaman.filter(item => {
                return item.judul.toLowerCase().includes(keyword.toLowerCase()) || 
                       item.ringkasan.toLowerCase().includes(keyword.toLowerCase());
            });

            // 4. Render Hasil ke Layar
            setTimeout(() => { // Sedikit jeda agar transisi terasa alami
                container.innerHTML = ""; // Bersihkan loading
                
                if (hasilFilter.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center py-5 text-muted">
                            <i class="bi bi-folder-x fs-1 text-danger mb-3 d-block"></i>
                            Maaf, informasi mengenai <strong>"${keyword}"</strong> tidak ditemukan di situs ini.
                        </div>`;
                } else {
                    hasilFilter.forEach(item => {
                        container.innerHTML += `
                            <div class="col-12">
                                <div class="card border-0 bg-light p-3 rounded shadow-sm hover-shadow">
                                    <h5 class="fw-bold mb-1">
                                        <a href="${item.url}" class="text-maroon text-decoration-none">${item.judul}</a>
                                    </h5>
                                    <p class="small text-muted mb-2">${window.location.origin}/${item.url}</p>
                                    <p class="text-secondary small mb-0">${item.ringkasan}</p>
                                </div>
                            </div>`;
                    });
                }
            }, 400);
        });
    </script>
</body>
</html>
