<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparansi APBL | Lembang Kaero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <main class="py-5 bg-light-custom">
        <div class="container">
            <div class="text-center mb-5" data-aos="fade-up">
                <h2 class="fw-bold text-dark text-uppercase">Laporan Realisasi APBL T.A 2025</h2>
                <div class="divider-center"></div>
                <p class="text-muted">Wujud Transparansi Sesuai Regulasi P3MD Kemendesa</p>
            </div>

            <div class="row g-4">
                <div class="col-md-6" data-aos="zoom-in">
                    <div class="card border-0 shadow-sm p-4">
                        <h4 class="fw-bold text-center text-maroon mb-4">Grafik Distribusi Pendapatan</h4>
                        <div style="height: 300px;"><canvas id="pageIncomeChart"></canvas></div>
                    </div>
                </div>
                <div class="col-md-6" data-aos="zoom-in">
                    <div class="card border-0 shadow-sm p-4">
                        <h4 class="fw-bold text-center text-success mb-4">Grafik Alokasi Pembiayaan Belanja</h4>
                        <div style="height: 300px;"><canvas id="pageExpenseChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
