<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galeri | Website Resmi Pemerintah Lembang Kaero</title>

<meta name="description"
content="Galeri kegiatan dan dokumentasi Pemerintah Lembang Kaero">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<header class="container-fluid px-md-5 py-3 bg-white shadow-sm">
</header>


<main class="container py-5">

<div class="text-center mb-5">

<h1 class="fw-bold">
GALERI LEMBANG KAERO
</h1>

<p class="text-muted">

Dokumentasi kegiatan dan pelayanan masyarakat

</p>

</div>


<div
class="row g-4"
id="gallery">

<div class="text-center">

<div class="spinner-border"></div>

<p class="mt-3">
Memuat galeri...
</p>

</div>

</div>

</main>


<footer class="bg-dark text-light pt-5">
</footer>


<script src="assets/js/Header.js"></script>

<script src="assets/js/Footer.js"></script>


<script>

const SHEET_ID =
"1PHumYBscib8egsUvJV1aRB9ReYlDe5vY6t4bLe0ntZY";

const SHEET_NAME =
"Form Responses 1";

const url =
`https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

function convertDriveUrl(url){

if(!url) return "";

const match =
url.match(/\/d\/(.*?)\//);

if(match){

return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1600`;

}

return url;

}

fetch(url)

.then(r=>r.json())

.then(data=>{

const gallery =
document.getElementById("gallery");

if(!data.length){

gallery.innerHTML=
"<p class='text-center'>Belum ada foto.</p>";

return;

}

gallery.innerHTML =
data
.reverse()
.map(item=>{

const image =
convertDriveUrl(
item["Upload Foto"]
);

const desc =
item["Deskripsi Foto"]
||
"Tanpa deskripsi";

return `

<div class="col-md-4">

<div class="card shadow-sm h-100">

<img
src="${image}"
class="card-img-top"
alt="${desc}"
loading="lazy"
style="
height:280px;
object-fit:cover;
">

<div class="card-body">

<p class="mb-0">

${desc}

</p>

</div>

</div>

</div>

`;

})
.join("");

})

.catch(()=>{

document
.getElementById("gallery")
.innerHTML=

`
<div class="text-center">

<h5>
Galeri gagal dimuat
</h5>

<p>
Periksa izin Google Sheet.
</p>

</div>
`;

});

</script>



</body>
</html>
