<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galeri | Website Resmi Pemerintah Lembang Kaero</title>

<meta name="description"
content="Galeri kegiatan dan dokumentasi Pemerintah Lembang Kaero">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<header class="container-fluid px-md-5 py-3 bg-white shadow-sm">
</header>


<main class="container py-5">

<div class="text-center mb-5">

<h1 class="fw-bold">
GALERI LEMBANG KAERO
</h1>

<p class="text-muted">

Dokumentasi kegiatan dan pelayanan masyarakat

</p>

</div>


<div
class="row g-4"
id="gallery">

<div class="text-center">

<div class="spinner-border"></div>

<p class="mt-3">
Memuat galeri...
</p>

</div>

</div>

</main>


<footer class="bg-dark text-light pt-5">
</footer>


<script src="assets/js/Header.js"></script>

<script src="assets/js/Footer.js"></script>


<script>

const SHEET_ID =
"1PHumYBscib8egsUvJV1aRB9ReYlDe5vY6t4bLe0ntZY";

/*
Ganti Sheet1 bila nama tab berbeda
*/

const url =
`https://opensheet.elk.sh/${SHEET_ID}/Form Responses 1`;

fetch(url)

.then(r=>r.json())

.then(data=>{

let html="";

data.reverse().forEach(item=>{

const foto =
item["Foto"]
||
item["Upload Foto"]
||
"";

const deskripsi =
item["Deskripsi Foto"]
||
item["Deskripsi"]
||
"Tanpa deskripsi";

if(foto){

html += `

<div class="col-md-4">

<div class="card shadow-sm h-100">

<img
src="${foto}"
class="card-img-top"
style="height:260px;object-fit:cover">

<div class="card-body">

<p class="mb-0">

${deskripsi}

</p>

</div>

</div>

</div>

`;

}

});

document
.getElementById(
"gallery"
)

.innerHTML =
html ||

"<p class='text-center'>Belum ada galeri.</p>";

})

.catch(()=>{

document
.getElementById(
"gallery"
)

.innerHTML=

"<p class='text-center text-danger'>Galeri gagal dimuat.</p>";

});

</script>

</body>
</html>
