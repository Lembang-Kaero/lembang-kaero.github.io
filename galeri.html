<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Galeri | Website Resmi Pemerintah Lembang Kaero</title>

<meta
name="description"
content="Galeri dokumentasi kegiatan dan pelayanan masyarakat Pemerintah Lembang Kaero">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link
href="assets/css/style.css"
rel="stylesheet">

</head>

<body>

<!-- HEADER -->
<header
class="container-fluid bg-white shadow-sm">
</header>

<!-- JUDUL -->
<section class="py-5">

<div class="container">

<div class="text-center mb-5">

<h1
class="fw-bold text-uppercase">

GALERI LEMBANG KAERO

</h1>

<p class="text-muted">

Dokumentasi kegiatan dan pelayanan masyarakat

</p>

</div>

<!-- GALERI -->
<div
class="row"
id="gallery">

<div class="text-center">

<div
class="spinner-border text-warning">
</div>

<p class="mt-3">

Memuat galeri...

</p>

</div>

</div>

</div>

</section>

<!-- FOOTER -->
<footer
class="bg-dark text-white pt-5 pb-3 mt-auto">
</footer>

<!-- ⬇️ INI YANG DULU HILANG — Bootstrap JS wajib untuk dropdown -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/Header.js"></script>
<script src="assets/js/Footer.js"></script>

<script>

/* ===========================
GOOGLE SHEET
=========================== */

const SHEET_ID =
"1PHumYBscib8egsUvJV1aRB9ReYlDe5vY6t4bLe0ntZY";

const SHEET_NAME =
"Form Responses 1";

const API =
`https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

/* ===========================
KONVERSI LINK GOOGLE DRIVE
=========================== */

function getImage(link){

if(!link) return "";

const patterns=[
/id=([^&]+)/,
/\/d\/([^/]+)/,
/file\/d\/([^/]+)/
];

for(let p of patterns){

const m=
link.match(p);

if(m){

return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w1600`;

}

}

return "";

}

/* ===========================
LOAD GALERI
=========================== */

async function loadGallery(){

const gallery=
document.getElementById(
"gallery"
);

try{

const response=
await fetch(API);

const data=
await response.json();

gallery.innerHTML="";

if(!data.length){

gallery.innerHTML=

`
<div class="col-12">

<div class="alert alert-warning text-center">

Belum ada foto.

</div>

</div>
`;

return;

}

data
.reverse()
.forEach(item=>{

const image=
getImage(
item["Upload Foto"]
);

const desc=

item["Deskripsi Foto"]

||

"Dokumentasi Kegiatan";

gallery.innerHTML +=

`

<div class="col-lg-4 col-md-6 mb-4">

<div
class="card shadow-sm border-0 h-100">

<img

src="${image}"

alt="${desc}"

loading="lazy"

class="card-img-top"

style="
height:260px;
object-fit:cover;
"

onerror="
this.src='assets/images/no-image.png'
">

<div class="card-body">

<p
class="mb-0">

${desc}

</p>

</div>

</div>

</div>

`;

});

}

catch(error){

gallery.innerHTML=

`

<div class="col-12">

<div
class="alert alert-danger text-center">

Galeri gagal dimuat

</div>

</div>

`;

}

}

loadGallery();

</script>

</body>
</html>
