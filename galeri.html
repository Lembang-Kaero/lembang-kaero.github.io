<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto | Lembang Kaero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light" style="font-family: 'Poppins', sans-serif;">
<header id="header-component" class="container-fluid px-md-5 py-3 bg-white shadow-sm"></header>
    <!-- (Gunakan Header & Navbar yang sama) -->

    <main class="container py-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-uppercase">Galeri Kegiatan & Budaya</h2>
            <p class="text-muted">Dokumentasi Visual Kehidupan Masyarakat Lembang Kaero</p>
        </div>

        <div class="row g-4">
            <!-- Foto 1 (Hero background) -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm overflow-hidden">
                    <img src="assets/images/images1.jpg" class="img-fluid" alt="Tongkonan" style="height: 250px; object-fit: cover;">
                    <div class="p-3 bg-white">
                        <p class="mb-0 fw-semibold small text-center">Arsitektur Rumah Adat Tongkonan Kaero</p>
                    </div>
                </div>
            </div>
            <!-- Placeholder Foto Lain -->
            <div class="col-md-4"> 
            <div class="card border-0 shadow-sm overflow-hidden">
                    <img src="assets/images/Musrenbang.webp" class="img-fluid" alt="Tongkonan" style="height: 250px; object-fit: cover;">
                    <div class="p-3 bg-white">
                        <p class="mb-0 fw-semibold small text-center">Musyawarah Perencanaan Pembangunan (Musrenbang) Lembang Kaero</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm overflow-hidden text-center bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 250px;">
                    <div><i class="bi bi-camera fs-1"></i><p class="small mt-2">Penyuluhan Posyandu Lembang</p></div>
                </div>
            </div>
        </div>
    </main>
<footer id="footer-component" class="bg-dark text-white pt-5 pb-3 mt-5"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>AOS.init();</script>

    <script src="assets/js/Header.js"></script>
    <script src="assets/js/Footer.js"></script>
    
</body>
</html>
