<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Pengaduan Warga | Lembang Kaero</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        /* Mengunci ukuran logo di dalam footer agar seragam */
        #footer-component img, 
        #footer-component .footer-logo {
            max-height: 80px !important;
            width: auto !important;
            object-fit: contain !important;
        }
        .card-pengaduan {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-whatsapp:hover {
            background-color: #20ba56;
            color: white;
            transform: translateY(-2px);
        }
        .btn-email-alt {
            background-color: #007bff;
            color: white;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-email-alt:hover {
            background-color: #0056b3;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-light" style="font-family: 'Poppins', sans-serif;">
    
    <header id="header-component"></header>

    <main class="container py-5">
        <div class="text-center mb-5 mt-3">
            <h2 class="fw-bold text-uppercase">Layanan Pengaduan Warga</h2>
            <p class="text-muted">Sampaikan aspirasi, laporan, atau keluhan Anda secara langsung ke Pemerintah Lembang Kaero</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card card-pengaduan p-4 p-md-5 bg-white">
                    <h4 class="fw-bold mb-4 text-success text-center">Formulir Laporan Pengaduan</h4>
                    
                    <form id="pengaduanForm">
                        <div class="mb-3">
                            <label for="nama" class="form-label fw-semibold">Nama Lengkap Pelapor</label>
                            <input type="text" class="form-control" id="nama" placeholder="Masukkan nama Anda (Bisa samarkan jika ingin anonim)" required>
                        </div>

                        <div class="mb-3">
                            <label for="dusun" class="form-label fw-semibold">Asal Dusun / Kampung</label>
                            <input type="text" class="form-control" id="dusun" placeholder="Contoh: Dusun Kaero" required>
                        </div>

                        <div class="mb-3">
                            <label for="judul" class="form-label fw-semibold">Judul/Perihal Pengaduan</label>
                            <input type="text" class="form-control" id="judul" placeholder="Contoh: Lampu Jalan Padam, Perbaikan Saluran Air, dll." required>
                        </div>

                        <div class="mb-4">
                            <label for="isi" class="form-label fw-semibold">Rincian Pengaduan / Keluhan</label>
                            <textarea class="form-control" id="isi" rows="5" placeholder="Tuliskan secara lengkap kronologi, lokasi, atau detail aspirasi yang ingin disampaikan..." required></textarea>
                        </div>

                        <div class="d-grid gap-3 d-md-flex justify-content-md-center mt-4">
                            <button type="button" onclick="kirimWhatsApp()" class="btn btn-whatsapp px-4 py-3 d-flex align-items-center justify-content-center">
                                <i class="bi bi-whatsapp fs-5 me-2"></i> Kirim via WhatsApp Admin
                            </button>
                            
                            <button type="button" onclick="kirimEmail()" class="btn btn-email-alt px-4 py-3 d-flex align-items-center justify-content-center">
                                <i class="bi bi-envelope-fill fs-5 me-2"></i> Kirim via E-mail Resmi
                            </button>
                        </div>
                    </form>
                    
                    <div class="mt-4 pt-3 border-top text-center text-muted small">
                        <i class="bi bi-shield-lock-fill text-warning"></i> Seluruh data pengaduan dikirim langsung menuju kontak resmi Pemerintah Lembang Kaero.
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer-component" class="bg-dark text-white pt-5 pb-3 mt-5"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Data Kontak Resmi Lembang Kaero sesuai data internal
        const nomorWAAdmin = "6281318785080"; // Menggunakan kode negara 62 untuk integrasi API WhatsApp resmi
        const emailLembang = "lembangkaero01@gmail.com";

        function ambilDataForm() {
            const nama = document.getElementById('nama').value;
            const dusun = document.getElementById('dusun').value;
            const judul = document.getElementById('judul').value;
            const isi = document.getElementById('isi').value;
            return { nama, dusun, judul, isi };
        }

        function validasiForm(data) {
            if (!data.nama || !data.dusun || !data.judul || !data.isi) {
                alert("Harap lengkapi seluruh formulir sebelum mengirim laporan.");
                return false;
            }
            return true;
        }

        // 1. FUNGSI KIRIM KE WHATSAPP ADMIN
        function kirimWhatsApp() {
            const data = ambilDataForm();
            if (!validasiForm(data)) return;

            // Membuat format pesan WhatsApp teks terstruktur
            const textPesan = `*PENGADUAN WARGA LEMBANG KAERO*%n%n` +
                              `• *Nama Pelapor:* ${data.nama}%n` +
                              `• *Asal Dusun:* ${data.dusun}%n` +
                              `• *Perihal:* ${data.judul}%n%n` +
                              `*Isi Pengaduan:*%n${data.isi}`;
            
            // Mengarahkan ke link API WhatsApp Web / Aplikasi
            const urlWA = `https://api.whatsapp.com/send?phone=${nomorWAAdmin}&text=${encodeURIComponent(textPesan).replace(/%25n/g, '%0A')}`;
            window.open(urlWA, '_blank');
        }

        // 2. FUNGSI KIRIM KE E-MAIL RESMI
        function kirimEmail() {
            const data = ambilDataForm();
            if (!validasiForm(data)) return;

            // Membuat subjek dan isi format untuk mailto browser
            const subjectEmail = `Pengaduan Warga: ${data.judul} - ${data.nama}`;
            const bodyEmail = `Yth. Pemerintah Lembang Kaero,\n\nBerikut rincian pengaduan yang ingin saya sampaikan:\n\nNama Pelapor: ${data.nama}\nAsal Dusun: ${data.dusun}\nPerihal: ${data.judul}\n\nDetail Pengaduan:\n${data.isi}\n\nMohon untuk dapat ditindaklanjuti. Terima kasih.`;
            
            const urlEmail = `mailto:${emailLembang}?subject=${encodeURIComponent(subjectEmail)}&body=${encodeURIComponent(bodyEmail)}`;
            window.location.href = urlEmail;
        }
    </script>

    <script src="assets/js/Header.js"></script>
    <script src="assets/js/Footer.js"></script>
</body>
</html>
