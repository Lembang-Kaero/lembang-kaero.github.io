<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengaduan Masyarakat | Website Resmi Lembang Kaero</title>

<meta name="description"
content="Layanan Pengaduan Masyarakat Pemerintah Lembang Kaero Kecamatan Sangalla Kabupaten Tana Toraja.">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<div id="header"></div>

<section class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow border-0">

<div class="card-header bg-success text-white">

<h3 class="mb-0">

<i class="bi bi-chat-dots-fill"></i>

Layanan Pengaduan Masyarakat

</h3>

</div>

<div class="card-body">

<p class="text-muted">

Silakan isi formulir berikut. Setelah menekan tombol <strong>Kirim Pengaduan</strong>, WhatsApp akan otomatis terbuka dengan laporan yang sudah tersusun.

</p>

<form id="pengaduanForm">

<div class="mb-3">

<label class="form-label">

Nama

</label>

<input
type="text"
class="form-control"
id="nama"
required>

</div>

<div class="mb-3">

<label class="form-label">

Nomor HP

</label>

<input
type="text"
class="form-control"
id="telepon">

</div>

<div class="mb-3">

<label class="form-label">

Kategori

</label>

<select
class="form-select"
id="kategori">

<option>Pelayanan</option>

<option>Pembangunan</option>

<option>Infrastruktur</option>

<option>Administrasi</option>

<option>Bantuan Sosial</option>

<option>Lainnya</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

Lokasi

</label>

<input
type="text"
class="form-control"
id="lokasi">

</div>

<div class="mb-3">

<label class="form-label">

Isi Pengaduan

</label>

<textarea
class="form-control"
rows="6"
id="isi"
required></textarea>

</div>

<div class="text-center">

<button
type="submit"
class="btn btn-success btn-lg px-5">

<i class="bi bi-whatsapp"></i>

Kirim Pengaduan

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</section>

<div id="footer"></div>

<script src="assets/js/Header.js"></script>

<script src="assets/js/Footer.js"></script>

<script src="assets/js/pengaduan.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
