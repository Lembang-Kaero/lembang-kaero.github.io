<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Pengaduan Masyarakat | Lembang Kaero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link class="content-style" rel="stylesheet" href="assets/css/style.css">
    <style>
        .bg-maroon { background-color: #800000 !important; }
        .text-maroon { color: #800000 !important; }
    </style>
</head>
<body class="bg-light" style="font-family: 'Poppins', sans-serif;">

    <!-- KOMPONEN HEADER DINAMIS -->
    <header id="header-component" class="container-fluid px-md-5 py-3 bg-white shadow-sm"></header>

    <!-- KONTEN UTAMA FORM PENGADUAN -->
    <main class="py-5">
        <div class="container d-flex justify-content-center">
            <div class="card border-0 shadow-sm overflow-hidden w-100" style="max-width: 800px;">
                
                <!-- Header Kartu -->
                <div class="bg-success text-white p-4 d-flex align-items-center gap-3">
                    <i class="bi bi-chat-left-dots-fill fs-3"></i>
                    <h3 class="fw-bold mb-0" style="font-size: 24px;">Layanan Pengaduan Masyarakat</h3>
                </div>

                <!-- Isi Form -->
                <div class="card-body p-4 bg-white">
                    <p class="text-secondary mb-4" style="font-size: 14px;">
                        Silakan isi formulir berikut. Setelah menekan tombol <strong>Kirim Pengaduan</strong>, WhatsApp akan otomatis terbuka dengan laporan yang sudah tersusun.
                    </p>

                    <form id="formPengaduan">
                        <div class="mb-3">
                            <label for="nama" class="form-label fw-semibold text-dark small">Nama</label>
                            <input type="text" id="nama" class="form-control" placeholder="Masukkan nama lengkap Anda" required>
                        </div>

                        <div class="mb-3">
                            <label for="nohp" class="form-label fw-semibold text-dark small">Nomor HP</label>
                            <input type="tel" id="nohp" class="form-control" placeholder="Contoh: 081234567xxx" required>
                        </div>

                        <div class="mb-3">
                            <label for="kategori" class="form-label fw-semibold text-dark small">Kategori</label>
                            <select id="kategori" class="form-select" required>
                                <option value="Pelayanan">Pelayanan</option>
                                <option value="Infrastruktur / Jalan">Infrastruktur / Jalan</option>
                                <option value="Keamanan & Ketertiban">Keamanan & Ketertiban</option>
                                <option value="Bantuan Sosial">Bantuan Sosial</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="lokasi" class="form-label fw-semibold text-dark small">Lokasi Kejadian / Dusun</label>
                            <input type="text" id="lokasi" class="form-control" placeholder="Sebutkan lokasi spesifik di Lembang Kaero" required>
                        </div>

                        <div class="mb-4">
                            <label for="isi" class="form-label fw-semibold text-dark small">Isi Pengaduan</label>
                            <textarea id="isi" class="form-control" rows="5" placeholder="Tuliskan detail pengaduan atau aspirasi Anda secara jelas..." required></textarea>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2.5 fw-bold text-uppercase shadow-sm">
                            <i class="bi bi-whatsapp me-2"></i>Kirim Pengaduan
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <!-- KOMPONEN FOOTER DINAMIS -->
    <footer id="footer-component" class="bg-dark text-white pt-5 pb-3 mt-5"></footer>

    <!-- JS Bootstrap & Loader Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/Header.js"></script>
    <script src="assets/js/Footer.js"></script>

    <!-- SCRIPT OTOMATISASI WHATSAPP -->
    <script>
        document.getElementById('formPengaduan').addEventListener('submit', function(e) {
            e.preventDefault();

            // Ambil data inputan form
            const nama = document.getElementById('nama').value;
            const nohp = document.getElementById('nohp').value;
            const kategori = document.getElementById('kategori').value;
            const lokasi = document.getElementById('lokasi').value;
            const isi = document.getElementById('isi').value;

            // Nomor admin / Kantor Lembang Kaero (Ganti sesuai nomor tujuan resmi Anda)
            const nomorWA = "6281234567890"; 

            // Susun format teks pesan
            const teksPesan = `*PENGADUAN WARGA LEMBANG KAERO*%0A` +
                              `--------------------------------------------%0A` +
                              `*Nama:* ${nama}%0A` +
                              `*No. HP:* ${nohp}%0A` +
                              `*Kategori:* ${kategori}%0A` +
                              `*Lokasi:* ${lokasi}%0A` +
                              `--------------------------------------------%0A` +
                              `*Isi Laporan:*%0A${isi}`;

            // Arahkan ke link WhatsApp resmi
            window.open(`https://api.whatsapp.com/send?phone=${nomorWA}&text=${teksPesan}`, '_blank');
        });
    </script>
</body>
</html>
