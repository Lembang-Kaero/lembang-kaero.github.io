<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemerintahan | Lembang Kaero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-light">

    <header id="header-component" class="container-fluid px-md-5 py-3 bg-white shadow-sm"></header>

  
    <!-- CONTENT -->
    <main class="container py-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-uppercase">Struktur Organisasi Pemerintahan</h2>
            <p class="text-muted">Aparat Pemerintah Lembang Kaero Periode Aktif</p>
        </div>

        <!-- Kepala Lembang -->
        <div class="row justify-content-center mb-5">
            <div class="col-md-4 text-center">
                <div class="card border-0 shadow-sm p-3">
                    <img src="assets/images/Kepala Lembang .png" alt="Kepala Lembang" class="img-fluid rounded mb-3 mx-auto" style="max-height: 250px; object-fit: cover;">
                    <h5 class="fw-bold mb-0">NURA MASSORA SALUSU</h5>
                    <p class="text-muted small">Kepala Lembang Kaero</p>
                </div>
            </div>
        </div>

        <!-- Perangkat Lembang -->
        <div class="row g-4 justify-content-center">
            <div class="col-md-3 text-center">
                <div class="card border-0 shadow-sm p-3">
                    <div class="bg-secondary text-white rounded py-4 mb-3"><i class="bi bi-person-badge fs-2"></i></div>
                    <h6 class="fw-bold mb-0">Oktopianus Sura'</h6>
                    <p class="text-muted small mb-0">Sekretaris Lembang</p>
                </div>
            </div>
            <div class="col-md-3 text-center">
                <div class="card border-0 shadow-sm p-3">
                    <div class="bg-secondary text-white rounded py-4 mb-3"><i class="bi bi-cash-coin fs-2"></i></div>
                    <h6 class="fw-bold mb-0">________________</h6>
                    <p class="text-muted small mb-0">Kaur Keuangan</p>
                </div>
            </div>
            <div class="col-md-3 text-center">
                <div class="card border-0 shadow-sm p-3">
                    <div class="bg-secondary text-white rounded py-4 mb-3"><i class="bi bi-file-earmark-text fs-2"></i></div>
                    <h6 class="fw-bold mb-0">________________</h6>
                    <p class="text-muted small mb-0">Kasi Pemerintahan</p>
                </div>
            </div>
        </div>
    </main>

   <footer id="footer-component" class="bg-dark text-white pt-5 pb-3 mt-5"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>AOS.init();</script>

    <script src="assets/js/Header.js"></script>
    <script src="assets/js/Footer.js"></script>
</body>
</html>
